[run]
name = "era5"
data_kind = "era5"
input_file = "data/era5/t2m_europe"
output_dir = "outputs/raw_metrics"
countries = ["Germany", "France"]
reference_period = [1981, 2010]
threshold_quantile = 0.90
min_heatwave_days = 3
top_years = 10

[era5]
variable = "t2m"
temperature_unit = "K"
pattern = "t2m_era5_*.nc"

# The completed manuscript comparison uses 1950-2025. The archived 2026
# analysis is an explicitly incomplete current-year event comparison.
